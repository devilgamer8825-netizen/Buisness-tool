<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #fff8f0; }

  .header {
    background: #ff6b35;
    color: white;
    text-align: center;
    padding: 20px;
  }
  .header h1 { font-size: 24px; }
  .header p { font-size: 13px; margin-top: 5px; }

  .menu-section {
    padding: 15px;
    max-width: 480px;
    margin: auto;
  }

  .category-title {
    background: #ff6b35;
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    margin: 15px 0 10px;
    font-weight: bold;
  }

  .item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    padding: 12px 15px;
    margin-bottom: 8px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  .item-info h3 { font-size: 15px; color: #333; }
  .item-info p { font-size: 12px; color: #888; }
  .item-price { font-weight: bold; color: #ff6b35; font-size: 15px; }

  .item-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn {
    background: #ff6b35;
    color: white;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
  }

  .qty { font-weight: bold; font-size: 16px; min-width: 20px; text-align: center; }

  .bill-box {
    background: white;
    margin: 20px 15px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .bill-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 14px;
    color: #555;
  }

  .bill-total {
    display: flex;
    justify-content: space-between;
    padding: 10px 0 0;
    font-size: 18px;
    font-weight: bold;
    color: #ff6b35;
    border-top: 2px dashed #ddd;
    margin-top: 8px;
  }

  .order-btn {
    display: block;
    width: calc(100% - 30px);
    max-width: 480px;
    margin: 10px auto 30px;
    padding: 15px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🍽️ Sharma Da Dhaba</h1>
  <p>📍 Model Town, Ludhiana | ⏰ 9AM–10PM</p>
</div>

<div class="menu-section" id="menuContainer"></div>

<div class="bill-box">
  <div class="bill-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
  <div class="bill-row"><span>GST (5%)</span><span id="gst">₹0</span></div>
  <div class="bill-total"><span>Total</span><span id="total">₹0</span></div>
</div>

<button class="order-btn" onclick="orderOnWhatsApp()">
  📲 Order on WhatsApp
</button>

<script>
const menu = {
  "🍛 Main Course": [
    { name: "Dal Makhani", desc: "Slow cooked black lentils", price: 180 },
    { name: "Paneer Butter Masala", desc: "Rich tomato gravy", price: 220 },
    { name: "Chicken Curry", desc: "Punjabi style", price: 280 },
    { name: "Mutton Rogan Josh", desc: "Slow cooked mutton", price: 380 }
  ],
  "🫓 Breads": [
    { name: "Butter Naan", desc: "Tandoor fresh", price: 40 },
    { name: "Laccha Paratha", desc: "Layered whole wheat", price: 50 },
    { name: "Missi Roti", desc: "Besan & wheat", price: 35 }
  ],
  "🍚 Rice": [
    { name: "Steamed Rice", desc: "Basmati", price: 120 },
    { name: "Veg Biryani", desc: "Aromatic spiced rice", price: 180 },
    { name: "Chicken Biryani", desc: "Dum cooked", price: 280 }
  ],
  "🥤 Drinks": [
    { name: "Lassi (Sweet)", desc: "Thick Punjabi style", price: 80 },
    { name: "Masala Chai", desc: "Ginger cardamom", price: 30 },
    { name: "Fresh Lime Soda", desc: "Sweet or salted", price: 60 }
  ]
};

const quantities = {};
let itemIndex = 0;

const container = document.getElementById('menuContainer');

for (const [category, items] of Object.entries(menu)) {
  const catDiv = document.createElement('div');
  catDiv.innerHTML = `<div class="category-title">${category}</div>`;

  items.forEach(item => {
    const id = `item_${itemIndex++}`;
    quantities[id] = 0;
    catDiv.innerHTML += `
      <div class="item">
        <div class="item-info">
          <h3>${item.name}</h3>
          <p>${item.desc}</p>
          <span class="item-price">₹${item.price}</span>
        </div>
        <div class="item-controls">
          <button class="btn" onclick="change('${id}', -1, ${item.price})">−</button>
          <span class="qty" id="qty_${id}">0</span>
          <button class="btn" onclick="change('${id}', 1, ${item.price})">+</button>
        </div>
      </div>`;
    container.appendChild(catDiv);
  });
}

function change(id, delta, price) {
  quantities[id] = Math.max(0, quantities[id] + delta);
  document.getElementById(`qty_${id}`).textContent = quantities[id];
  updateBill();
}

function updateBill() {
  let subtotal = 0;
  document.querySelectorAll('.item').forEach((el, i) => {
    const id = `item_${i}`;
    const price = parseInt(el.querySelector('.item-price').textContent.replace('₹',''));
    subtotal += (quantities[id] || 0) * price;
  });
  const gst = Math.round(subtotal * 0.05);
  document.getElementById('subtotal').textContent = `₹${subtotal}`;
  document.getElementById('gst').textContent = `₹${gst}`;
  document.getElementById('total').textContent = `₹${subtotal + gst}`;
}

function orderOnWhatsApp() {
  let order = "🍽️ *New Order — Sharma Da Dhaba*\n\n";
  let total = 0;
  document.querySelectorAll('.item').forEach((el, i) => {
    const id = `item_${i}`;
    const qty = quantities[id] || 0;
    if (qty > 0) {
      const name = el.querySelector('h3').textContent;
      const price = parseInt(el.querySelector('.item-price').textContent.replace('₹',''));
      order += `• ${name} x${qty} = ₹${qty * price}\n`;
      total += qty * price;
    }
  });
  const gst = Math.round(total * 0.05);
  order += `\n💰 Subtotal: ₹${total}\n📊 GST: ₹${gst}\n✅ *Total: ₹${total + gst}*`;
  window.open(`https://wa.me/917888000000?text=${encodeURIComponent(order)}`);
}
</script>
</body>
</html>
